services:

  dnf-1:
    image: ${DNF_IMAGE:?set DNF_IMAGE in .env.release}
    hostname: dnf-1
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - SERVER_GROUP=${SERVER_GROUP:-3}
      - SERVER_GROUP_DB=${SERVER_GROUP_DB:-cain}
      - DNF_DB_ROOT_PASSWORD=${DNF_DB_ROOT_PASSWORD:-88888888}
      - DNF_DB_GAME_PASSWORD=${DNF_DB_GAME_PASSWORD:-uu5!^%jg}
      - GATE_AES_KEY=${GATE_AES_KEY:?set GATE_AES_KEY in .env.release}
      - WEB_USER=${WEB_USER:-root}
      - WEB_PASS=${WEB_PASS:-123456}
      - PUBLIC_IP=${PUBLIC_IP:-}
      - AUTO_PUBLIC_IP=${AUTO_PUBLIC_IP:-true}
      - OPEN_CHANNEL=${OPEN_CHANNEL:-11}
      - CLIENT_POOL_SIZE=${CLIENT_POOL_SIZE:-10}
    shm_size: 8g
    memswap_limit: -1
    mem_limit: 1g
    cpu_count: 1
    restart: always
    ports:
      - 2000:180/tcp
      - 3000:3306/tcp
      - 5505:5505/tcp
      - 8088:80/tcp
      - 7001:7001/tcp
      - 7001:7001/udp
      - 7300:7300/tcp
      - 7300:7300/udp
      - 30011:30011/tcp
      - 31011:31011/udp
      - 2311-2313:2311-2313/udp
    volumes:
      - ./data:/data
      - ./mysql:/var/lib/mysql
      - ./log:/home/neople/game/log

  godofgm:
    image: ${GM_IMAGE:?set GM_IMAGE in .env.release}
    network_mode: "service:dnf-1"
    depends_on:
      - dnf-1
    restart: always
    volumes:
      - ./data/godofgm:/opt/godofgm/data
      - ./log/godofgm:/opt/godofgm/log
