version: "2.3"

services:

  dnf-1:
    hostname: dnf-1
    build:
      context: /home/ubuntu/dnf/dnf
      dockerfile: build/Debian13-DNF/Dockerfile
    image: shenji-overlay-dnf:local
    environment:
      - TZ=Asia/Shanghai
      - SERVER_GROUP=3
      - SERVER_GROUP_DB=cain
      - DNF_DB_ROOT_PASSWORD=88888888
      # 神迹 DP 约束: 游戏库密码保持默认值
      - DNF_DB_GAME_PASSWORD=uu5!^%jg
      - GATE_AES_KEY=a1b2c3d4e5f6789012345678901234567890abcdef0123456789abcdef012345
      # 手动填写公网/局域网 IP，或留空后启用 AUTO_PUBLIC_IP
      - PUBLIC_IP=
      - AUTO_PUBLIC_IP=true
      # 先按神迹原始脚本只开 11 频道，跑通后再扩展
      - OPEN_CHANNEL='11'
      - CLIENT_POOL_SIZE=10
    shm_size: 8g
    memswap_limit: -1
    mem_limit: 1g
    cpu_count: 1
    restart: always
    ports:
      - 2000:180/tcp
      - 3000:3306/tcp
      - 5505:5505/tcp
      - 8088:80/tcp
      - 7001:7001/tcp
      - 7001:7001/udp
      - 7300:7300/tcp
      - 7300:7300/udp
      - 30011:30011/tcp
      - 31011:31011/udp
      - 2311-2313:2311-2313/udp
    volumes:
      - ./data:/data
      - ./mysql:/var/lib/mysql
      - ./log:/home/neople/game/log

  godofgm:
    build:
      context: .
      dockerfile: Dockerfile.godofgm
    image: shenji-overlay-godofgm:local
    network_mode: "service:dnf-1"
    depends_on:
      - dnf-1
    restart: always
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - GODOFGM_ADMIN_USERNAME=${GODOFGM_ADMIN_USERNAME:-}
      - GODOFGM_ADMIN_PASSWORD=${GODOFGM_ADMIN_PASSWORD:-}
      - GM_ACCOUNT=${GM_ACCOUNT:-}
      - GM_PASSWORD=${GM_PASSWORD:-}
    volumes:
      - ./data/godofgm:/opt/godofgm/data
      - ./log/godofgm:/opt/godofgm/log
