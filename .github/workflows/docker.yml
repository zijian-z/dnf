name: ci

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tag to run the workflow on'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: debian13
            dockerfile: build/Debian13-DNF/Dockerfile
          - os: alma9
            dockerfile: build/Alma9-DNF/Dockerfile
          - os: ubuntu26
            dockerfile: build/Ubuntu26-DNF/Dockerfile
          - os: centos7
            dockerfile: build/Centos7-DNF/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image tags
        id: tags
        run: |
          DOCKERHUB_IMAGE="llnut/dnf"
          GHCR_IMAGE="ghcr.io/llnut/dnf"
          QUAY_IMAGE="quay.io/llnut/dnf"
          ACR_IMAGE="${{ secrets.ACR_REGISTRY }}/llnut/dnf"
          OS="${{ matrix.os }}"

          IS_RELEASE=false
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tags }}" ]; then
            IS_RELEASE=true
            DATE=$(echo "${{ github.event.inputs.tags }}" | sed 's/^Release-//')
            TAG="${OS}-qf1031-${DATE}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            TAG="${OS}-qf1031-dev-${SHORT_SHA}"
          fi

          TAGS="${DOCKERHUB_IMAGE}:${TAG},${GHCR_IMAGE}:${TAG},${QUAY_IMAGE}:${TAG},${ACR_IMAGE}:${TAG}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "is_release=${IS_RELEASE}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Login to ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: true
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.os }}
          cache-to: type=gha,mode=max,scope=${{ matrix.os }}

      - name: Tag latest
        run: |
          TAG="${{ steps.tags.outputs.image_tag }}"
          if [ "${{ steps.tags.outputs.is_release }}" == "true" ]; then
            LATEST="${{ matrix.os }}-qf1031-latest"
          else
            LATEST="${{ matrix.os }}-qf1031-dev-latest"
          fi
          IMAGES=(
            "llnut/dnf"
            "ghcr.io/llnut/dnf"
            "quay.io/llnut/dnf"
            "${{ secrets.ACR_REGISTRY }}/llnut/dnf"
          )
          for IMAGE in "${IMAGES[@]}"; do
            docker buildx imagetools create --tag "${IMAGE}:${LATEST}" "${IMAGE}:${TAG}"
          done
