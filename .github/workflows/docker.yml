name: docker

on:
  push:
    branches: [ "master", "main" ]
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      tags:
        description: 'Tag to run the workflow on'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: debian13
            dockerfile: build/Debian13-DNF/Dockerfile
          - os: alma9
            dockerfile: build/Alma9-DNF/Dockerfile
          - os: ubuntu26
            dockerfile: build/Ubuntu26-DNF/Dockerfile
          - os: centos7
            dockerfile: build/Centos7-DNF/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image tags
        id: tags
        run: |
          DOCKERHUB_IMAGE="llnut/dnf"
          GHCR_IMAGE="ghcr.io/llnut/dnf"
          OS="${{ matrix.os }}"

          if [ "${{ github.event_name }}" == "release" ]; then
            DATE=$(echo "${{ github.event.release.tag_name }}" | sed 's/^Release-//')
            TAG="${OS}-qf1031-${DATE}"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tags }}" ]; then
            DATE=$(echo "${{ github.event.inputs.tags }}" | sed 's/^Release-//')
            TAG="${OS}-qf1031-${DATE}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            TAG="${OS}-qf1031-${SHORT_SHA}"
          fi

          TAGS="${DOCKERHUB_IMAGE}:${TAG},${GHCR_IMAGE}:${TAG}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: true
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.os }}
          cache-to: type=gha,mode=max,scope=${{ matrix.os }}
